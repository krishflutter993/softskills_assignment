</div>
</div>

                Military-Grade Security

            <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>

<!-- Interactive Background Elements (Atmospheric) -->
<div class="absolute -bottom-20 -left-20 w-96 h-96 bg-secondary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute -top-20 -right-20 w-96 h-96 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<script>
        // Micro-interaction for the card to follow mouse slightly
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.glass-card');
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (x > 0 && x < rect.width && y > 0 && y < rect.height) {
                const moveX = (x - rect.width / 2) / 25;
                const moveY = (y - rect.height / 2) / 25;
                card.style.transform = `perspective(1000px) rotateX(${-moveY}deg) rotateY(${moveX}deg)`;
            } else {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
            }
        });

        // Ensure transition reset when mouse leaves
        document.querySelector('.glass-card').style.transition = 'transform 0.4s ease-out';
    </script>
