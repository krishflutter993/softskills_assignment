<style>

<body class="flex flex-col min-h-screen font-body-md text-body-md antialiased">

<h1 class="font-headline-xl text-headline-xl text-on-surface tracking-tight leading-tight">
                Instant Access, <br/>
<span class="text-primary">Zero Friction</span>
</h1>

                Unlock your vault with biometrics or a master key. Fast, secure, and always ready.
            </p>

<!-- Pagination Dots -->
<div class="flex gap-3 mt-xl">
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-8 h-2 rounded-full bg-primary shadow-[0_0_10px_rgba(184,196,255,0.5)]"></div>

<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.glass-card');
            
            // Subtle tilt effect on mouse/touch
            window.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });

            // Reset tilt
            window.addEventListener('mouseleave', () => {
                card.style.transform = `rotateY(0deg) rotateX(0deg)`;
                card.style.transition = 'all 0.5s ease';
            });
        });
    </script>
