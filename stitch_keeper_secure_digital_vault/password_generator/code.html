<script>
        const lengthSlider = document.getElementById('lengthSlider');
        const lengthVal = document.getElementById('lengthVal');
        const passwordOutput = document.getElementById('passwordOutput');
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');

        const chars = {
            upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lower: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            symbols: '!@#$%^&*()_+~`|}{[]:;?><,./-='
        };

        function generatePassword() {
            const length = parseInt(lengthSlider.value);
            const checkboxes = document.querySelectorAll('.switch-input');
            let charset = '';
            
            if (checkboxes[0].checked) charset += chars.upper;
            if (checkboxes[1].checked) charset += chars.lower;
            if (checkboxes[2].checked) charset += chars.numbers;
            if (checkboxes[3].checked) charset += chars.symbols;

            if (charset === '') charset = chars.lower; // Fallback

            let password = '';
            for (let i = 0; i < length; i++) {
                password += charset.charAt(Math.floor(Math.random() * charset.length));
            }

            // Animate transition
            passwordOutput.style.opacity = '0';
            setTimeout(() => {
                passwordOutput.textContent = password;
                passwordOutput.style.opacity = '1';
            }, 100);
        }

        lengthSlider.addEventListener('input', (e) => {
            lengthVal.textContent = e.target.value;
            generatePassword();
        });

        generateBtn.addEventListener('click', () => {
            const icon = generateBtn.querySelector('.material-symbols-outlined');
            icon.style.transform = 'rotate(360deg)';
            icon.style.transition = 'transform 0.5s ease-in-out';
            generatePassword();
            setTimeout(() => { icon.style.transform = 'rotate(0deg)'; }, 500);
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(passwordOutput.textContent);
            const originalText = copyBtn.querySelector('.font-label-md').textContent;
            copyBtn.querySelector('.font-label-md').textContent = 'Copied!';
            copyBtn.classList.add('bg-primary/20');
            setTimeout(() => {
                copyBtn.querySelector('.font-label-md').textContent = originalText;
                copyBtn.classList.remove('bg-primary/20');
            }, 2000);
        });

        // Initialize
        generatePassword();
    </script>
