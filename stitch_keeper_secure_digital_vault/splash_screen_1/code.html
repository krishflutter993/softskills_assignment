<style>
        body {
            background-color: #08122F;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        
        .bg-splash-gradient {
            background: radial-gradient(circle at center, #132042 0%, #08122F 100%);
        }

        .shimmer-text {
            background: linear-gradient(90deg, #b8c4ff, #e2e1ed, #b8c4ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .pulse-soft {
            animation: pulse-soft 3s ease-in-out infinite;
        }

        @keyframes pulse-soft {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .progress-line {
            width: 0%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #b8c4ff, transparent);
            animation: loading 3s ease-in-out infinite;
        }

        @keyframes loading {
            0% { width: 0%; left: 0%; }
            50% { width: 40%; }
            100% { width: 0%; left: 100%; }
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Glassmorphism utility */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

<body class="antialiased font-body-md text-on-surface">
<!-- Splash Screen Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-between bg-splash-gradient overflow-hidden">
<!-- Top Visual Anchor: Subtle Ambient Glow -->
<div class="absolute top-[-10%] left-1/2 -translate-x-1/2 w-[800px] h-[600px] bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
<!-- Center: Logo and Visual Metaphor -->
<div class="flex-1 flex items-center justify-center relative w-full px-margin-mobile">
<div class="relative w-full max-w-sm aspect-square flex items-center justify-center">
<!-- Outer Glass Circle Decor -->
<div class="absolute inset-0 rounded-full border border-white/5 pulse-soft"></div>
<div class="absolute inset-8 rounded-full border border-primary/10 pulse-soft" style="animation-delay: 1s;"></div>
<!-- The Animated Logo Shader -->
<div class="relative z-10 w-64 h-64 md:w-80 md:h-80">
<!-- STITCH_SVG_START:ANIMATION_2 class="absolute inset-0 w-full h-full opacity-90" --><div class="absolute inset-0 w-full h-full opacity-90" id="animated-svg-ANIMATION_2" style="display:block;"><svg viewbox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<defs>
<lineargradient id="logoGradient" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" style="stop-color:#5B7CFF;stop-opacity:1"></stop>
<stop offset="100%" style="stop-color:#9C6BFF;stop-opacity:1"></stop>
</lineargradient>
<filter height="140%" id="glow" width="140%" x="-20%" y="-20%">
<fegaussianblur result="blur" stddeviation="5"></fegaussianblur>
<fecomposite in="SourceGraphic" in2="blur" operator="over"></fecomposite>
</filter>
</defs>
<!-- Outer Shield -->
<path d="M100 20 L40 45 V90 C40 135 100 180 100 180 C100 180 160 135 160 90 V45 L100 20Z" fill="none" stroke="url(#logoGradient)" stroke-linecap="round" stroke-linejoin="round" stroke-width="8">
<animate attributename="stroke-dasharray" dur="2s" fill="freeze" from="0 600" to="600 600"></animate>
</path>
<!-- Inner Keyhole -->
<g filter="url(#glow)">
<circle cx="100" cy="85" fill="url(#logoGradient)" r="15">
<animate attributename="opacity" dur="3s" repeatcount="indefinite" values="0.5;1;0.5"></animate>
</circle>
<path d="M90 100 L110 100 L115 140 L85 140 Z" fill="url(#logoGradient)">
<animate attributename="opacity" dur="3s" repeatcount="indefinite" values="0.5;1;0.5"></animate>
</path>
</g>
<!-- Circuit Lines -->
<path d="M60 70 H80 M120 70 H140 M60 110 H80 M120 110 H140" stroke="#C7D2FE" stroke-linecap="round" stroke-width="4">
<animate attributename="opacity" dur="2s" repeatcount="indefinite" values="0;1;0"></animate>
</path>
</svg></div><!-- STITCH_SVG_END:ANIMATION_2 -->
<!-- Fallback/Overlay Glow -->
<div class="absolute inset-0 rounded-full bg-primary/10 blur-3xl mix-blend-screen pointer-events-none"></div>
</div>
</div>
</div>

<h1 class="font-poppins font-bold text-4xl md:text-5xl tracking-tighter text-on-surface flex items-center justify-center gap-3">

</h1>

                    Secure your digital life.
                </p>
</div>
<!-- Loading Indicator -->

<div class="progress-line absolute top-0"></div>
</div>

<p class="text-[10px] font-label-md text-primary/40 uppercase tracking-widest animate-pulse">
                Establishing Secure Vault Connection
            </p>
</div>
<!-- Atmospheric Floating Particles (CSS only for weight) -->
<div class="absolute inset-0 pointer-events-none">
<div class="w-full h-full opacity-30" id="particles-container"></div>
</div>
</main>
<!-- Hidden shell as mandated by hierarchy logic for non-transactional top-level, 
         but since this is a Splash Screen (Linear/Transactional intent), 
         we exclude NavBars/Shells as per "Shell Visibility & Relevance" rule. -->
<script>
        // Simple Micro-interaction: Particle generation for high-end feel
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('particles-container');
            const count = 20;

            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.style.position = 'absolute';
                particle.style.width = Math.random() * 2 + 1 + 'px';
                particle.style.height = particle.style.width;
                particle.style.background = 'rgba(184, 196, 255, 0.4)';
                particle.style.borderRadius = '50%';
                
                const posX = Math.random() * 100;
                const posY = Math.random() * 100;
                particle.style.left = posX + '%';
                particle.style.top = posY + '%';
                
                const duration = 10 + Math.random() * 20;
                const delay = Math.random() * -20;
                
                particle.animate([
                    { transform: 'translate(0, 0) opacity(0)', offset: 0 },
                    { transform: `translate(${Math.random() * 40 - 20}px, ${Math.random() * -100}px)`, opacity: 0.8, offset: 0.5 },
                    { transform: `translate(${Math.random() * 80 - 40}px, -200px) opacity(0)`, offset: 1 }
                ], {
                    duration: duration * 1000,
                    iterations: Infinity,
                    delay: delay * 1000,
                    easing: 'ease-in-out'
                });

                container.appendChild(particle);
            }
        });
    </script>
