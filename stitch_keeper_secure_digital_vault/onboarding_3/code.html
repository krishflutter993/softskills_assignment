<script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.querySelector('.primary-gradient');
            btn.addEventListener('click', () => {
                // Haptic feedback simulation or navigation logic
                console.log('Transitioning to setup flow...');
            });

            // Smooth parallax on mouse move for desktop
            if (window.innerWidth > 1024) {
                window.addEventListener('mousemove', (e) => {
                    const x = (e.clientX - window.innerWidth / 2) / 50;
                    const y = (e.clientY - window.innerHeight / 2) / 50;
                    document.querySelector('.floating-element').style.transform = `translate(${x}px, ${y}px)`;
                });
            }
        });
    </script>
