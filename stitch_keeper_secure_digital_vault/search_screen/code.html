<!-- Script for subtle interaction -->
<script>
        document.querySelector('input').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const suggestions = document.querySelectorAll('section:last-of-type .glass-card');
            
            suggestions.forEach(item => {
                const title = item.querySelector('h3').textContent.toLowerCase();
                const email = item.querySelector('p').textContent.toLowerCase();
                if (title.includes(query) || email.includes(query)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        });
    </script>
