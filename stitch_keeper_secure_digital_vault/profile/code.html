<script>
        // Micro-interactions for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.style.transform = 'scale(0.95)';
            });
            btn.addEventListener('touchend', () => {
                btn.style.transform = 'scale(1)';
            });
        });

        // Atmospheric visual effect
        const createParticle = () => {
            const particle = document.createElement('div');
            const size = Math.random() * 2 + 1;
            particle.className = 'fixed bg-primary opacity-20 pointer-events-none rounded-full blur-[1px]';
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.top = '100vh';
            document.body.appendChild(particle);

            const animation = particle.animate([
                { transform: `translateY(0) translateX(0)`, opacity: 0 },
                { transform: `translateY(-50vh) translateX(${Math.random() * 40 - 20}px)`, opacity: 0.2 },
                { transform: `translateY(-100vh) translateX(${Math.random() * 80 - 40}px)`, opacity: 0 }
            ], {
                duration: Math.random() * 10000 + 5000,
                easing: 'linear'
            });

            animation.onfinish = () => particle.remove();
        };

        setInterval(createParticle, 2000);
    </script>
