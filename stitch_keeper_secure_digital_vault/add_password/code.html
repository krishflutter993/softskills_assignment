<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Geist:wght@400;500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0c0e15; /* surface-container-lowest */
            margin: 0;
            padding: 0;
            color: #e2e1ed;
            font-family: 'Inter', sans-serif;
        }
        .glass-input {
            background: rgba(30, 31, 39, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .glass-input:focus-within {
            border-color: #b8c4ff;
            box-shadow: 0 0 15px rgba(184, 196, 255, 0.15);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #2c51d4 0%, #6c88ff 100%);
        }
        .cyber-bg {
            background: radial-gradient(circle at 50% -20%, #132042 0%, #0c0e15 80%);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#452000",
                        "surface-tint": "#b8c4ff",
                        "tertiary": "#ffb781",
                        "on-primary-fixed": "#001454",
                        "on-primary": "#002585",
                        "surface-container-low": "#1a1b23",
                        "secondary": "#d2bbff",
                        "secondary-fixed": "#eaddff",
                        "tertiary-fixed": "#ffdcc5",
                        "tertiary-fixed-dim": "#ffb781",
                        "surface": "#12131b",
                        "surface-container": "#1e1f27",
                        "on-surface-variant": "#c4c5d7",
                        "on-background": "#e2e1ed",
                        "background": "#12131b",
                        "on-tertiary-fixed-variant": "#703800",
                        "surface-container-lowest": "#0c0e15",
                        "on-secondary-fixed": "#25005a",
                        "tertiary-container": "#db7612",
                        "outline": "#8e90a0",
                        "outline-variant": "#444654",
                        "on-secondary-fixed-variant": "#581ab8",
                        "surface-container-highest": "#33343d",
                        "primary-container": "#6c88ff",
                        "secondary-fixed-dim": "#d2bbff",
                        "surface-dim": "#12131b",
                        "error": "#ffb4ab",
                        "surface-variant": "#33343d",
                        "primary-fixed-dim": "#b8c4ff",
                        "on-secondary": "#3e008e",
                        "surface-bright": "#383941",
                        "on-tertiary": "#4e2500",
                        "on-error-container": "#ffdad6",
                        "on-primary-fixed-variant": "#0037ba",
                        "on-surface": "#e2e1ed",
                        "primary-fixed": "#dde1ff",
                        "on-tertiary-fixed": "#301400",
                        "on-error": "#690005",
                        "surface-container-high": "#282932",
                        "primary": "#b8c4ff",
                        "inverse-surface": "#e2e1ed",
                        "inverse-on-surface": "#2f3038",
                        "on-secondary-container": "#c6aaff",
                        "inverse-primary": "#2c51d4",
                        "on-primary-container": "#001f75",
                        "secondary-container": "#5a1eba",
                        "error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "margin-desktop": "40px",
                        "base": "8px",
                        "xs": "4px",
                        "xl": "32px",
                        "lg": "24px",
                        "md": "16px",
                        "margin-mobile": "20px",
                        "sm": "12px"
                    },
                    "fontFamily": {
                        "label-md": ["Geist"],
                        "body-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "code-sm": ["Geist"],
                        "body-md": ["Inter"],
                        "headline-xl": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "headline-lg-mobile": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "code-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-xl": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="cyber-bg min-h-screen pb-24">
<!-- Top Navigation Header -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-white/10 shadow-[0_8px_32px_0_rgba(184,196,255,0.1)] flex items-center justify-between px-margin-mobile h-16">
<div class="flex items-center gap-4">
<button class="active:scale-95 duration-200 hover:opacity-80 transition-opacity text-primary">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary tracking-tight">Add Item</h1>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant">info</span>
</div>
</header>
<main class="pt-24 px-margin-mobile max-w-lg mx-auto">
<!-- Visual Decorator -->
<div class="mb-xl flex flex-col items-center">
<div class="w-16 h-16 rounded-full bg-primary/10 border border-primary/20 flex items-center justify-center mb-md shadow-[0_0_30px_rgba(184,196,255,0.1)]">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant text-center">Securely add a new credential to your encrypted vault.</p>
</div>
<!-- Form Section -->
<form class="space-y-md">
<!-- Website Name -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-base">Website Name</label>
<div class="glass-input flex items-center rounded-lg px-md h-14">
<span class="material-symbols-outlined text-outline-variant mr-md">language</span>
<input class="bg-transparent border-none outline-none flex-1 text-on-surface font-body-md placeholder:text-outline-variant focus:ring-0" placeholder="e.g. GitHub" type="text"/>
</div>
</div>
<!-- Website URL -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-base">Website URL</label>
<div class="glass-input flex items-center rounded-lg px-md h-14">
<span class="material-symbols-outlined text-outline-variant mr-md">link</span>
<input class="bg-transparent border-none outline-none flex-1 text-on-surface font-body-md placeholder:text-outline-variant focus:ring-0" placeholder="https://github.com" type="url"/>
</div>
</div>
<!-- Username/Email -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-base">Username or Email</label>
<div class="glass-input flex items-center rounded-lg px-md h-14">
<span class="material-symbols-outlined text-outline-variant mr-md">alternate_email</span>
<input class="bg-transparent border-none outline-none flex-1 text-on-surface font-body-md placeholder:text-outline-variant focus:ring-0" placeholder="your@email.com" type="text"/>
</div>
</div>
<!-- Password -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-base">Password</label>
<div class="glass-input flex items-center rounded-lg px-md h-14">
<span class="material-symbols-outlined text-outline-variant mr-md">password</span>
<input class="bg-transparent border-none outline-none flex-1 text-on-surface font-body-md placeholder:text-outline-variant focus:ring-0" id="password-field" placeholder="••••••••••••" type="password"/>
<button class="text-outline-variant hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="eye-icon">visibility</span>
</button>
</div>
</div>
<!-- Category -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-base">Category</label>
<div class="glass-input flex items-center rounded-lg px-md h-14 relative">
<span class="material-symbols-outlined text-outline-variant mr-md">folder</span>
<select class="bg-transparent border-none outline-none flex-1 text-on-surface font-body-md appearance-none focus:ring-0 cursor-pointer">
<option class="bg-surface-container-high" value="social">Social Media</option>
<option class="bg-surface-container-high" value="finance">Banking & Finance</option>
<option class="bg-surface-container-high" value="work">Work Tools</option>
<option class="bg-surface-container-high" value="personal">Personal</option>
<option class="bg-surface-container-high" value="other">Other</option>
</select>
<span class="material-symbols-outlined text-outline-variant pointer-events-none">expand_more</span>
</div>
</div>
<!-- Notes -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-base">Notes</label>
<div class="glass-input flex items-start rounded-lg px-md py-md min-h-[120px]">
<span class="material-symbols-outlined text-outline-variant mr-md mt-1">notes</span>
<textarea class="bg-transparent border-none outline-none flex-1 text-on-surface font-body-md placeholder:text-outline-variant focus:ring-0 resize-none h-full" placeholder="Add any extra details here..."></textarea>
</div>
</div>
<!-- Save Button -->
<div class="pt-lg">
<button class="w-full h-14 rounded-full primary-gradient font-headline-lg-mobile text-headline-lg-mobile text-white shadow-[0_10px_30px_rgba(44,81,212,0.4)] active:scale-95 transition-all duration-200" type="submit">
                    Save Item
                </button>
</div>
</form>
</main>
<!-- Bottom Navigation (Suppressing as this is a transactional sub-page per logic, but adding small floating back home indicator for UX) -->
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 px-lg py-sm bg-surface-container/60 backdrop-blur-2xl border border-white/5 rounded-full shadow-[0_20px_50px_rgba(0,0,0,0.3)] flex items-center gap-md z-50">
<span class="font-label-md text-label-md text-on-surface-variant opacity-60">AUTO-SAVING ACTIVE</span>
<div class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_#b8c4ff] animate-pulse"></div>
</div>
<!-- Decorative Atmosphere -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
<div class="absolute -top-1/4 -right-1/4 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-1/4 -left-1/4 w-[600px] h-[600px] bg-secondary/5 rounded-full blur-[120px]"></div>
</div>
<script>
        function togglePassword() {
            const field = document.getElementById('password-field');
            const icon = document.getElementById('eye-icon');
            if (field.type === 'password') {
                field.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                field.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        // Add a subtle click effect to glass inputs
        document.querySelectorAll('.glass-input').forEach(input => {
            input.addEventListener('click', () => {
                input.classList.add('scale-[0.99]');
                setTimeout(() => input.classList.remove('scale-[0.99]'), 100);
            });
        });
    </script>
</body></html>
