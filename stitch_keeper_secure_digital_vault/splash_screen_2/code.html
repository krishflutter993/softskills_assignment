<style>
        body {
            background-color: #08122F;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .gradient-background {
            background: linear-gradient(180deg, #08122F 0%, #132042 100%);
        }

        .glass-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .loading-line-container {
            width: 140px;
            height: 2px;
            background: rgba(184, 196, 255, 0.1);
            border-radius: 1px;
            overflow: hidden;
            position: relative;
        }

        .loading-line-progress {
            width: 40%;
            height: 100%;
            background: #b8c4ff;
            box-shadow: 0 0 10px rgba(184, 196, 255, 0.6);
            position: absolute;
            animation: loading-slide 2s cubic-bezier(0.65, 0, 0.35, 1) infinite;
        }

        @keyframes loading-slide {
            0% { left: -40%; }
            100% { left: 100%; }
        }

        .fade-in {
            animation: fadeIn 1.2s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pulse-soft {
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.6; filter: blur(40px); }
            50% { opacity: 0.9; filter: blur(60px); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen text-on-surface select-none">
<!-- Atmospheric Depth Layer -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 gradient-background"></div>
<!-- Subtle Glow Orb Behind Logo -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-primary/10 rounded-full pulse-soft blur-[50px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-center w-full max-w-sm px-margin-mobile text-center h-full">
<!-- Animated Logo Section -->
<div class="flex-grow flex items-center justify-center">
<div class="w-48 h-48 relative flex items-center justify-center scale-110">
<!-- STITCH_SVG_START:ANIMATION_2 class="w-full h-full" --><div class="w-full h-full" id="animated-svg-ANIMATION_2" style="display:block;"><svg viewbox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<defs>
<lineargradient id="logoGradient" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" style="stop-color:#5B7CFF;stop-opacity:1"></stop>
<stop offset="100%" style="stop-color:#9C6BFF;stop-opacity:1"></stop>
</lineargradient>
<filter height="140%" id="glow" width="140%" x="-20%" y="-20%">
<fegaussianblur result="blur" stddeviation="5"></fegaussianblur>
<fecomposite in="SourceGraphic" in2="blur" operator="over"></fecomposite>
</filter>
</defs>
<!-- Outer Shield -->
<path d="M100 20 L40 45 V90 C40 135 100 180 100 180 C100 180 160 135 160 90 V45 L100 20Z" fill="none" stroke="url(#logoGradient)" stroke-linecap="round" stroke-linejoin="round" stroke-width="8">
<animate attributename="stroke-dasharray" dur="2s" fill="freeze" from="0 600" to="600 600"></animate>
</path>
<!-- Inner Keyhole -->
<g filter="url(#glow)">
<circle cx="100" cy="85" fill="url(#logoGradient)" r="15">
<animate attributename="opacity" dur="3s" repeatcount="indefinite" values="0.5;1;0.5"></animate>
</circle>
<path d="M90 100 L110 100 L115 140 L85 140 Z" fill="url(#logoGradient)">
<animate attributename="opacity" dur="3s" repeatcount="indefinite" values="0.5;1;0.5"></animate>
</path>
</g>
<!-- Circuit Lines -->
<path d="M60 70 H80 M120 70 H140 M60 110 H80 M120 110 H140" stroke="#C7D2FE" stroke-linecap="round" stroke-width="4">
<animate attributename="opacity" dur="2s" repeatcount="indefinite" values="0;1;0"></animate>
</path>
</svg></div><!-- STITCH_SVG_END:ANIMATION_2 -->
</div>
</div>
<!-- Branding Section (Bottom Anchor) -->
<div class="pb-16 w-full flex flex-col items-center gap-md fade-in">
<h1 class="font-headline-xl text-headline-xl text-primary tracking-tight font-bold mb-1">
                KEEPER
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant opacity-80 mb-xl">
                Secure your digital life.
            </p>
<!-- Loading Indicator -->
<div class="loading-line-container">
<div class="loading-line-progress"></div>
</div>
<span class="mt-md font-label-md text-label-md text-primary/40 uppercase tracking-[0.2em]">
                Initializing Vault
            </span>
</div>
</main>
<!-- Subtle Footer Hint -->
<div class="fixed bottom-8 z-10 opacity-30">
<p class="font-label-md text-label-md">v2.4.0 • ENCRYPTED CONNECTION</p>
</div>
<script>
        // Micro-interaction: Subtle parallax on mouse move or device tilt
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 15;
            const y = (e.clientY / window.innerHeight - 0.5) * 15;
            const main = document.querySelector('main');
            main.style.transform = `translate(${x}px, ${y}px)`;
        });

        // Suppression of UI Shells for Splash Screen as per "Semantic Shell" mandate
        // (TopAppBar and BottomNavBar are NOT rendered here because it is a transactional/splash screen)
    </script>
</body></html>
