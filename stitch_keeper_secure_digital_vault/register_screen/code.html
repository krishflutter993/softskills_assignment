<style>
    body {
      background-color: #08122F; /* Brand midnight base */
      color: #e2e1ed;
      -webkit-font-smoothing: antialiased;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-card {
      background: rgba(19, 32, 66, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }
    .primary-gradient {
      background: linear-gradient(135deg, #b8c4ff 0%, #2c51d4 100%);
    }
    .inner-glow {
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
    }
    .input-focus-glow:focus-within {
      box-shadow: 0 0 0 4px rgba(184, 196, 255, 0.15);

    }

<style>
    body {

<body class="min-h-screen flex flex-col overflow-x-hidden font-body-md">
<!-- Ambient Animated Background -->
<div class="fixed inset-0 z-0 pointer-events-none">

</div>
<!-- Header: Back Button (Shared Components Logic: Suppressed Nav Shell for Transactional Page) -->
<header class="relative z-10 flex items-center px-margin-mobile h-20">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container/40 backdrop-blur-md border border-white/5 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
</header>
<main class="relative z-10 flex-1 px-margin-mobile pb-12 flex flex-col items-center">
<!-- Hero Header -->
<div class="w-full max-w-md mt-4 mb-xl">
<h1 class="font-headline-xl text-headline-xl text-on-surface tracking-tight mb-xs">Create Account</h1>
<p class="font-body-md text-on-surface-variant">Secure your digital vault in seconds.</p>
</div>
<!-- Registration Form Card -->
<div class="w-full max-w-md glass-card rounded-lg p-lg inner-glow">
<form class="space-y-md">
<!-- Full Name Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-surface-tint block px-1">Full Name</label>
<div class="relative flex items-center bg-surface-container-lowest rounded-md border border-outline-variant transition-all input-focus-glow">
<span class="material-symbols-outlined absolute left-4 text-outline text-[20px]">person</span>
<input class="w-full bg-transparent border-none text-on-surface placeholder:text-outline-variant py-3 pl-12 pr-4 rounded-md focus:ring-0 focus:outline-none" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-surface-tint block px-1">Email</label>
<div class="relative flex items-center bg-surface-container-lowest rounded-md border border-outline-variant transition-all input-focus-glow">
<span class="material-symbols-outlined absolute left-4 text-outline text-[20px]">mail</span>
<input class="w-full bg-transparent border-none text-on-surface placeholder:text-outline-variant py-3 pl-12 pr-4 rounded-md focus:ring-0 focus:outline-none" placeholder="john@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-surface-tint block px-1">Password</label>
<div class="relative flex items-center bg-surface-container-lowest rounded-md border border-outline-variant transition-all input-focus-glow">
<span class="material-symbols-outlined absolute left-4 text-outline text-[20px]">lock</span>
<input class="w-full bg-transparent border-none text-on-surface placeholder:text-outline-variant py-3 pl-12 pr-12 rounded-md focus:ring-0 focus:outline-none" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-surface-tint block px-1">Confirm Password</label>
<div class="relative flex items-center bg-surface-container-lowest rounded-md border border-outline-variant transition-all input-focus-glow">
<span class="material-symbols-outlined absolute left-4 text-outline text-[20px]">verified_user</span>
<input class="w-full bg-transparent border-none text-on-surface placeholder:text-outline-variant py-3 pl-12 pr-12 rounded-md focus:ring-0 focus:outline-none" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms Agreement -->
<div class="flex items-start gap-3 py-2">
<div class="relative flex items-center">
<input class="peer h-5 w-5 appearance-none rounded border-2 border-outline-variant bg-transparent checked:bg-primary checked:border-primary transition-all cursor-pointer" id="terms" type="checkbox"/>
<span class="material-symbols-outlined absolute left-0 text-on-primary text-[20px] scale-0 peer-checked:scale-100 transition-transform pointer-events-none" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="terms">
            I agree to the <span class="text-primary font-semibold">Terms of Service</span> and <span class="text-primary font-semibold">Privacy Policy</span>.
          </label>
</div>
<!-- Register Button -->
<button class="w-full primary-gradient text-on-primary py-4 rounded-full font-headline-lg-mobile text-headline-lg-mobile shadow-[0_10px_30px_-5px_rgba(44,81,212,0.4)] hover:brightness-110 active:scale-95 transition-all mt-lg flex items-center justify-center gap-2" type="submit">
          Register
          <span class="material-symbols-outlined text-[24px]">arrow_forward</span>
</button>
</form>
</div>
<!-- Sign In Redirect -->
<div class="mt-xl text-center">
<p class="font-body-md text-on-surface-variant">
        Already have an account? 
        <a class="text-primary font-semibold hover:underline decoration-2 underline-offset-4 ml-1" href="#">Sign In</a>
</p>
</div>
<!-- Decorative Branding Footer -->
<div class="mt-auto pt-xl">
<div class="flex items-center gap-2 opacity-30 select-none">
<span class="w-8 h-[1px] bg-outline-variant"></span>
<span class="font-label-md text-label-md tracking-widest text-outline">KEEPER SECURE ENCLAVE</span>
<span class="w-8 h-[1px] bg-outline-variant"></span>
</div>
</div>
</main>
<script>
    // Micro-interaction for form focus
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
      input.addEventListener('focus', () => {
        input.parentElement.classList.add('border-primary');
        input.parentElement.previousElementSibling.classList.add('text-primary');
      });
      input.addEventListener('blur', () => {
        input.parentElement.classList.remove('border-primary');
        input.parentElement.previousElementSibling.classList.remove('text-primary');
      });
    });

    // Toggle password visibility interaction
    const togglePass = document.querySelector('button .material-symbols-outlined:contains("visibility")');
    if (togglePass) {
        togglePass.parentElement.addEventListener('click', function() {
            const input = this.previousElementSibling;
            const icon = this.querySelector('span');
            if (input.type === "password") {
                input.type = "text";
                icon.innerText = "visibility_off";
            } else {
                input.type = "password";
                icon.innerText = "visibility";
            }
        });
    }
  </script>
</body></html>
