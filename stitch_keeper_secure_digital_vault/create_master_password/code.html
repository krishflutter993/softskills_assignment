<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KEEPER - Create Master Key</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Geist:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
    :root {
      --primary: #b8c4ff;
      --surface: #12131b;
    }
    body {
      background-color: #08122F; /* Brand Anchor: Deep Midnight */
      color: #e2e1ed;
      overflow-x: hidden;
    }
    .glass-card {
      background: rgba(19, 32, 66, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }
    .inner-glow {
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
    }
    .strength-segment {
      height: 4px;
      border-radius: 2px;
      transition: all 0.4s ease;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>

      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "on-tertiary-container": "#452000",
                  "surface-tint": "#b8c4ff",
                  "tertiary": "#ffb781",
                  "on-primary-fixed": "#001454",
                  "on-primary": "#002585",
                  "surface-container-low": "#1a1b23",
                  "secondary": "#d2bbff",
                  "secondary-fixed": "#eaddff",
                  "tertiary-fixed": "#ffdcc5",
                  "tertiary-fixed-dim": "#ffb781",
                  "surface": "#12131b",
                  "surface-container": "#1e1f27",
                  "on-surface-variant": "#c4c5d7",
                  "on-background": "#e2e1ed",
                  "background": "#12131b",
                  "on-tertiary-fixed-variant": "#703800",
                  "surface-container-lowest": "#0c0e15",
                  "on-secondary-fixed": "#25005a",
                  "tertiary-container": "#db7612",
                  "outline": "#8e90a0",
                  "outline-variant": "#444654",
                  "on-secondary-fixed-variant": "#581ab8",
                  "surface-container-highest": "#33343d",
                  "primary-container": "#6c88ff",
                  "secondary-fixed-dim": "#d2bbff",
                  "surface-dim": "#12131b",
                  "error": "#ffb4ab",
                  "surface-variant": "#33343d",
                  "primary-fixed-dim": "#b8c4ff",
                  "on-secondary": "#3e008e",
                  "surface-bright": "#383941",
                  "on-tertiary": "#4e2500",
                  "on-error-container": "#ffdad6",
                  "on-primary-fixed-variant": "#0037ba",
                  "on-surface": "#e2e1ed",
                  "primary-fixed": "#dde1ff",
                  "on-tertiary-fixed": "#301400",
                  "on-error": "#690005",
                  "surface-container-high": "#282932",
                  "primary": "#b8c4ff",
                  "inverse-surface": "#e2e1ed",
                  "inverse-on-surface": "#2f3038",
                  "on-secondary-container": "#c6aaff",
                  "inverse-primary": "#2c51d4",
                  "on-primary-container": "#001f75",
                  "secondary-container": "#5a1eba",
                  "error-container": "#93000a"
          },
          "borderRadius": {
                  "DEFAULT": "1rem",
                  "lg": "2rem",
                  "xl": "3rem",
                  "full": "9999px"
          },
          "spacing": {
                  "gutter": "16px",
                  "margin-desktop": "40px",
                  "base": "8px",
                  "xs": "4px",
                  "xl": "32px",
                  "lg": "24px",
                  "md": "16px",
                  "margin-mobile": "20px",
                  "sm": "12px"
          },
          "fontFamily": {

                  "body-sm": ["Inter"],
                  "headline-lg": ["Inter"],

          "fontSize": {

                  "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                  "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                  "headline-lg-mobile": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                  "code-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                  "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                  "headline-xl": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
          }
        },
      },
    }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop bg-surface-container-lowest">
<!-- Atmospheric Background -->
<div class="fixed inset-0 z-0 pointer-events-none flex items-center justify-center overflow-hidden">
<div class="w-full h-full opacity-40 bg-[radial-gradient(circle_at_50%_50%,_rgba(184,196,255,0.08)_0%,_transparent_50%)]"></div>
<!-- Subtle Vault Illustration (CSS Based) -->
<div class="absolute w-[600px] h-[600px] rounded-full border border-primary/5 shadow-[0_0_100px_rgba(184,196,255,0.03)] flex items-center justify-center animate-pulse">
<div class="w-[400px] h-[400px] rounded-full border border-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-[120px] text-primary/10 select-none" style="font-variation-settings: 'wght' 100;">lock_reset</span>
</div>
</div>
</div>
<!-- Main Content -->
<main class="relative z-10 w-full max-w-[440px]">
<!-- Branding/Header Area -->
<header class="text-center mb-xl space-y-md">
<div class="flex justify-center mb-md">
<div class="p-3 bg-primary/10 rounded-2xl border border-primary/20 backdrop-blur-md">
<span class="material-symbols-outlined text-primary text-[32px]">shield_person</span>
</div>
</div>
<h1 class="font-headline-xl text-headline-xl text-on-surface tracking-tight">The Master Key</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px] mx-auto">
        This password unlocks your entire vault. Make it strong.
      </p>
</header>
<!-- Create Vault Form -->
<section class="glass-card rounded-lg p-lg space-y-lg inner-glow">
<form class="space-y-lg" onsubmit="event.preventDefault();">
<!-- Password Field 1 -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-primary px-1 block">MASTER PASSWORD</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface-container-highest/40 border border-outline-variant/30 rounded-md py-4 pl-12 pr-12 text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all font-body-md text-body-md" placeholder="Enter complex password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Password Strength Meter -->
<div class="space-y-xs">
<div class="flex justify-between items-center px-1 mb-1">
<span class="font-label-md text-label-md text-on-surface-variant">STRENGTH</span>
<span class="font-label-md text-label-md text-tertiary">Strong</span>
</div>
<div class="flex gap-2">
<!-- Strength Segments -->
<div class="strength-segment w-1/4 bg-error shadow-[0_0_8px_rgba(255,180,171,0.4)]"></div>
<div class="strength-segment w-1/4 bg-tertiary shadow-[0_0_8px_rgba(255,183,129,0.4)]"></div>
<div class="strength-segment w-1/4 bg-primary shadow-[0_0_8px_rgba(184,196,255,0.4)]"></div>
<div class="strength-segment w-1/4 bg-outline-variant/30"></div>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant px-1 block uppercase">Confirm Master Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">verified_user</span>
<input class="w-full bg-surface-container-highest/40 border border-outline-variant/30 rounded-md py-4 pl-12 pr-12 text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all font-body-md text-body-md" placeholder="Re-enter password" type="password"/>
</div>
</div>
<!-- Submit Button -->
<div class="pt-md">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary-container font-headline-lg-mobile text-headline-lg-mobile py-4 rounded-full shadow-[0_8px_24px_rgba(108,136,255,0.3)] hover:shadow-[0_12px_32px_rgba(108,136,255,0.4)] hover:-translate-y-0.5 active:translate-y-0 active:scale-95 transition-all duration-200">
            Create Vault
          </button>
</div>
</form>
<!-- Security Notice -->
<footer class="flex items-start gap-3 bg-primary/5 p-4 rounded-md border border-primary/10 mt-xl">
<span class="material-symbols-outlined text-primary text-md mt-0.5">info</span>
<p class="font-body-sm text-body-sm text-on-surface-variant leading-snug">
          Keeper uses end-to-end encryption. We never see your master password. If lost, it cannot be recovered.
        </p>
</footer>
</section>
<!-- Navigation suppressed per task requirements for task-focused onboarding screens -->
</main>
<!-- Interactive Script for Micro-interactions -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
      const inputs = document.querySelectorAll('input');
      const segments = document.querySelectorAll('.strength-segment');
      
      // Simulate strength meter activation on input
      inputs[0].addEventListener('input', (e) => {
        const length = e.target.value.length;
        if (length > 0) {
          segments[0].classList.add('opacity-100');
          if (length > 5) segments[1].classList.add('opacity-100');
          else segments[1].classList.remove('opacity-100');
          if (length > 10) segments[2].classList.add('opacity-100');
          else segments[2].classList.remove('opacity-100');
        } else {
          segments.forEach(s => s.classList.remove('opacity-100'));
        }
      });

      // Toggle visibility simulation
      const visibilityBtn = document.querySelector('button[type="button"]');
      visibilityBtn.addEventListener('click', () => {
        const input = inputs[0];
        const icon = visibilityBtn.querySelector('.material-symbols-outlined');
        if (input.type === 'password') {
          input.type = 'text';
          icon.textContent = 'visibility_off';
        } else {
          input.type = 'password';
          icon.textContent = 'visibility';
        }
      });
    });
  </script>
</body></html>
