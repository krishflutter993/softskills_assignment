<script>
        // Micro-interaction for backup button
        const backupBtn = document.getElementById('backupBtn');
        const progressRing = document.querySelector('.progress-ring');
        
        backupBtn.addEventListener('click', () => {
            let offset = 276;
            backupBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Backing up...';
            backupBtn.disabled = true;
            
            const interval = setInterval(() => {
                offset -= 5;
                if (offset <= 0) {
                    offset = 0;
                    clearInterval(interval);
                    backupBtn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Backup Complete';
                    setTimeout(() => {
                        backupBtn.innerHTML = '<span class="material-symbols-outlined">sync</span> Backup Now';
                        backupBtn.disabled = false;
                        progressRing.style.strokeDashoffset = 70; // Reset to static state
                    }, 2000);
                }
                progressRing.style.strokeDashoffset = offset;
            }, 30);
        });
    </script>
