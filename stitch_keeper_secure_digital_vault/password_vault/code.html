<script>
        // Micro-interaction for Copy Buttons
        document.querySelectorAll('button').forEach(btn => {
            if(btn.textContent.includes('Copy')) {
                btn.addEventListener('click', function() {
                    const originalContent = this.innerHTML;
                    this.innerHTML = `<span class="material-symbols-outlined text-[18px]">check</span><span class="font-label-md text-label-md">Copied</span>`;
                    this.classList.replace('text-primary', 'text-success');
                    setTimeout(() => {
                        this.innerHTML = originalContent;
                        this.classList.replace('text-success', 'text-primary');
                    }, 2000);
                });
            }
        });

        // Simple scroll parallax effect for background
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            document.body.style.backgroundPosition = `center ${scrolled * 0.5}px`;
        });
    </script>
