<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KEEPER | Unlock Vault</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Geist:wght@400;500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&amp;family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-container": "#452000",
                    "surface-tint": "#b8c4ff",
                    "tertiary": "#ffb781",
                    "on-primary-fixed": "#001454",
                    "on-primary": "#002585",
                    "surface-container-low": "#1a1b23",
                    "secondary": "#d2bbff",
                    "secondary-fixed": "#eaddff",
                    "tertiary-fixed": "#ffdcc5",
                    "tertiary-fixed-dim": "#ffb781",
                    "surface": "#12131b",
                    "surface-container": "#1e1f27",
                    "on-surface-variant": "#c4c5d7",
                    "on-background": "#e2e1ed",
                    "background": "#12131b",
                    "on-tertiary-fixed-variant": "#703800",
                    "surface-container-lowest": "#0c0e15",
                    "on-secondary-fixed": "#25005a",
                    "tertiary-container": "#db7612",
                    "outline": "#8e90a0",
                    "outline-variant": "#444654",
                    "on-secondary-fixed-variant": "#581ab8",
                    "surface-container-highest": "#33343d",
                    "primary-container": "#6c88ff",
                    "secondary-fixed-dim": "#d2bbff",
                    "surface-dim": "#12131b",
                    "error": "#ffb4ab",
                    "surface-variant": "#33343d",
                    "primary-fixed-dim": "#b8c4ff",
                    "on-secondary": "#3e008e",
                    "surface-bright": "#383941",
                    "on-tertiary": "#4e2500",
                    "on-error-container": "#ffdad6",
                    "on-primary-fixed-variant": "#0037ba",
                    "on-surface": "#e2e1ed",
                    "primary-fixed": "#dde1ff",
                    "on-tertiary-fixed": "#301400",
                    "on-error": "#690005",
                    "surface-container-high": "#282932",
                    "primary": "#b8c4ff",
                    "inverse-surface": "#e2e1ed",
                    "inverse-on-surface": "#2f3038",
                    "on-secondary-container": "#c6aaff",
                    "inverse-primary": "#2c51d4",
                    "on-primary-container": "#001f75",
                    "secondary-container": "#5a1eba",
                    "error-container": "#93000a"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "16px",
                    "margin-desktop": "40px",
                    "base": "8px",
                    "xs": "4px",
                    "xl": "32px",
                    "lg": "24px",
                    "md": "16px",
                    "margin-mobile": "20px",
                    "sm": "12px"
            },
            "fontFamily": {
                    "label-md": ["Geist"],
                    "body-sm": ["Inter"],
                    "headline-lg": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "code-sm": ["Geist"],
                    "body-md": ["Inter"],
                    "headline-xl": ["Inter"]
            },
            "fontSize": {
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "headline-lg-mobile": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "code-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-xl": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .glass-panel {
            background: rgba(19, 32, 66, 0.4);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .biometric-ring {
            animation: pulse-ring 3s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 0.3; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 48;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Atmospheric Background Animation -->

<!-- Top App Bar (Shared Component Strategy) -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-margin-mobile h-16 bg-surface/80 backdrop-blur-xl border-b border-white/10 shadow-[0_8px_32px_0_rgba(184,196,255,0.1)]">
<div class="flex items-center gap-2">
<span class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary tracking-tight">KEEPER</span>
</div>
<div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container overflow-hidden">
<span class="material-symbols-outlined text-sm">person</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md px-margin-mobile flex flex-col items-center gap-xl">
<!-- Biometric Section -->
<div class="relative flex items-center justify-center mt-xl">
<!-- Animated Glow Rings -->
<div class="absolute w-40 h-40 rounded-full border border-primary/30 biometric-ring"></div>
<div class="absolute w-56 h-56 rounded-full border border-primary/10 biometric-ring" style="animation-delay: 1s;"></div>
<!-- Biometric Icon Container -->
<div class="w-28 h-28 glass-panel rounded-full flex items-center justify-center shadow-[0_0_40px_rgba(184,196,255,0.15)] transition-transform hover:scale-105 active:scale-95 duration-300 cursor-pointer">
<span class="material-symbols-outlined text-primary text-6xl select-none" style="font-variation-settings: 'wght' 300;">face</span>
</div>
</div>
<!-- Lock Status -->
<div class="text-center">
<h1 class="font-headline-xl text-headline-xl text-on-background mb-xs">Vault is Locked</h1>
<p class="font-body-md text-body-md text-on-surface-variant opacity-70">Enter your master password to continue</p>
</div>
<!-- Unlock Form -->
<div class="w-full space-y-md">
<!-- Input Field -->
<div class="relative group">
<label class="absolute left-4 -top-2 px-2 bg-background/0 font-label-md text-label-md text-primary transition-all duration-200 pointer-events-none" for="master_password">Master Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant/50">lock</span>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container rounded-lg border border-white/5 focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none font-body-md text-body-md text-on-surface" id="master_password" placeholder="••••••••••••" type="password"/>
<button class="absolute right-4 text-on-surface-variant/50 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-14 bg-gradient-to-r from-inverse-primary to-primary-container text-on-primary font-bold rounded-full shadow-[0_8px_20px_rgba(44,81,212,0.3)] hover:shadow-[0_12px_24px_rgba(44,81,212,0.4)] hover:-translate-y-0.5 active:scale-[0.98] transition-all duration-200">
                Unlock
            </button>
<!-- FaceID Fallback -->
<div class="flex justify-center pt-base">
<button class="flex items-center gap-2 text-primary font-label-md text-label-md hover:opacity-80 transition-opacity active:scale-95">
<span class="material-symbols-outlined text-sm">fingerprint</span>
                    Use Biometrics
                </button>
</div>
</div>
<!-- Secondary Navigation (Suppressing BottomNav for Auth focused flow) -->
<div class="mt-xl flex flex-col items-center gap-md">
<div class="flex items-center gap-base text-on-surface-variant/60 font-body-sm text-body-sm">
<span class="material-symbols-outlined text-xs">shield_lock</span>
                End-to-end encrypted vault
            </div>
<button class="text-on-surface-variant/40 hover:text-on-surface-variant transition-colors font-label-md text-label-md uppercase tracking-widest">
                Forgot Password?
            </button>
</div>
</main>
<!-- Visual Polish: Floating Particles -->
<div class="fixed inset-0 pointer-events-none opacity-20">
<div class="absolute top-1/4 left-1/4 w-32 h-32 bg-primary/20 blur-[80px] rounded-full"></div>
<div class="absolute bottom-1/4 right-1/4 w-48 h-48 bg-secondary/20 blur-[100px] rounded-full"></div>
</div>
<script>
        // Micro-interaction: Focus state label shift
        const input = document.getElementById('master_password');
        const label = input.closest('.group').querySelector('label');
        
        input.addEventListener('focus', () => {
            label.classList.add('text-primary');
            label.classList.remove('text-on-surface-variant');
        });

        input.addEventListener('blur', () => {
            if (!input.value) {
                label.classList.remove('text-primary');
            }
        });

        // Simple vibration simulation for "FaceID" click
        document.querySelector('.w-28.h-28').addEventListener('click', () => {
            const container = document.querySelector('.w-28.h-28');
            container.style.boxShadow = '0 0 60px rgba(184,196,255,0.4)';
            setTimeout(() => {
                container.style.boxShadow = '';
            }, 300);
        });
    </script>
</body></html>
