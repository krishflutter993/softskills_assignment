            background-color: #12131b;

            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(30, 31, 39, 0.6);
            backdrop-filter: blur(20px);

        .primary-gradient {
            background: linear-gradient(135deg, #b8c4ff 0%, #6c88ff 100%);
        }
        .glow-hover:hover {
            box-shadow: 0 0 20px rgba(184, 196, 255, 0.4);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

                        "on-background": "#e2e1ed",

                        "on-tertiary-fixed-variant": "#703800",
                        "surface-container-lowest": "#0c0e15",
                        "on-secondary-fixed": "#25005a",
                        "tertiary-container": "#db7612",
                        "outline": "#8e90a0",
                        "outline-variant": "#444654",
                        "on-secondary-fixed-variant": "#581ab8",
                        "surface-container-highest": "#33343d",
                        "primary-container": "#6c88ff",
                        "secondary-fixed-dim": "#d2bbff",
                        "surface-dim": "#12131b",
                        "error": "#ffb4ab",
                        "surface-variant": "#33343d",
                        "primary-fixed-dim": "#b8c4ff",
                        "on-secondary": "#3e008e",
                        "surface-bright": "#383941",
                        "on-tertiary": "#4e2500",

                        "on-surface": "#e2e1ed",

                        "xl": "32px",

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="flex flex-col min-h-screen">
<!-- Atmospheric Background Shader -->
<div class="fixed inset-0 z-0 pointer-events-none opacity-40">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-secondary-container/10 blur-[150px] rounded-full"></div>
</div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-white/10 shadow-[0_8px_32px_0_rgba(184,196,255,0.1)] flex items-center justify-between px-margin-mobile h-16">
<div class="w-10"></div> <!-- Leading Spacer -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary tracking-tight">KEEPER</h1>
<div class="flex items-center justify-center w-10 h-10 hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-primary" data-icon="search">search</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-margin-mobile pt-24 pb-12 z-10 relative">
<div class="w-full max-w-md">
<!-- Title Section -->
<div class="text-center mb-xl">
<h2 class="font-headline-xl text-headline-xl text-on-surface mb-2">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Secure access to your digital fortress.</p>
</div>
<!-- Login Form -->
<div class="glass-card rounded-lg p-lg space-y-md inner-glow">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</div>
<input class="w-full bg-surface-container-high border-0 rounded-md py-4 pl-12 pr-4 text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-highest transition-all outline-none" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-end ml-1">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="w-full bg-surface-container-high border-0 rounded-md py-4 pl-12 pr-12 text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-highest transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Action Buttons -->
<div class="pt-md space-y-md">
<!-- Primary Sign In -->
<button class="w-full primary-gradient text-on-primary font-headline-lg-mobile py-4 rounded-full font-bold shadow-lg glow-hover active:scale-95 transition-all duration-200">
                        Sign In
                    </button>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-grow bg-white/10"></div>
<span class="font-label-md text-label-md text-outline-variant">OR</span>
<div class="h-[1px] flex-grow bg-white/10"></div>
</div>
<!-- Secondary Google Login -->
<button class="w-full bg-white/5 border border-white/10 backdrop-blur-md text-on-surface font-body-md py-4 rounded-full flex items-center justify-center gap-3 hover:bg-white/10 active:scale-95 transition-all duration-200">
<svg fill="none" height="20" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Sign in with Google
                    </button>
</div>
</div>
<!-- Bottom Signup Link -->
<p class="text-center mt-xl font-body-md text-body-md text-on-surface-variant">
                Don't have an account? <a class="text-primary font-bold hover:underline transition-all" href="#">Sign Up</a>
</p>
</div>
</main>
<!-- Success Feedback Overlay (Hidden by default) -->
<div class="fixed inset-0 z-[100] flex items-center justify-center bg-background/90 backdrop-blur-xl opacity-0 pointer-events-none transition-opacity duration-500" id="success-feedback">
<div class="text-center">
<div class="w-24 h-24 rounded-full border-4 border-primary flex items-center justify-center mx-auto mb-md animate-pulse">
<span class="material-symbols-outlined text-[48px] text-primary" data-icon="check" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<h3 class="font-headline-xl text-headline-xl text-on-surface">Authenticated</h3>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Decrypting vault...</p>
</div>
</div>
<script>
        // Micro-interactions
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.style.transform = 'scale(0.95)';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.transform = 'scale(1)';
            });
        });

        // Simulate Login
        const primaryBtn = document.querySelector('.primary-gradient');
        const feedback = document.getElementById('success-feedback');
        
        primaryBtn.addEventListener('click', () => {
            feedback.classList.remove('opacity-0', 'pointer-events-none');
            feedback.classList.add('opacity-100');
            setTimeout(() => {
                // In a real app, this would redirect
                console.log('Redirecting to dashboard...');
            }, 2000);
        });

        // Toggle visibility eye icon
        const visibilityBtn = document.querySelector('[data-icon="visibility"]');
        const passwordInput = document.getElementById('password');
        let isVisible = false;

        visibilityBtn.parentElement.addEventListener('click', () => {
            isVisible = !isVisible;
            passwordInput.type = isVisible ? 'text' : 'password';
            visibilityBtn.innerText = isVisible ? 'visibility_off' : 'visibility';
        });

        // Simple mouse move parallax for the cards
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.glass-card');
            const { clientX, clientY } = e;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const moveX = (clientX - centerX) / 50;
            const moveY = (clientY - centerY) / 50;
            
            card.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
</body></html>
