name: Build and Release Flutter APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APKs (Split per ABI)
        run: flutter build apk --split-per-abi --release

      - name: Rename and Prepare APKs
        run: |
          mkdir -p build/release-apks
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/release-apks/rto-assmant-arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/release-apks/rto-assmant-armeabi-v7a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk build/release-apks/rto-assmant-x86_64.apk

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/release-apks/*

      - name: Create and Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/release-apks/rto-assmant-arm64-v8a.apk
            build/release-apks/rto-assmant-armeabi-v7a.apk
            build/release-apks/rto-assmant-x86_64.apk
          draft: false
          prerelease: false
          tag_name: ${{ github.ref_name || 'v1.0.0' }}
          name: Release ${{ github.ref_name || 'v1.0.0' }}
          body: |
            Automated release build of the new Flutter project.
            
            ### Assets
            * **Release APK (ARM64)**: `rto-assmant-arm64-v8a.apk`
            * **Release APK (ARMv7)**: `rto-assmant-armeabi-v7a.apk`
            * **Release APK (x86_64)**: `rto-assmant-x86_64.apk`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
